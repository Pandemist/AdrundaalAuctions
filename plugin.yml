config:
  #Use Item as currency (true) or use Vault Money (Vault Plugin is necessary)(false)
  item-money-use: true
  #Minimum price you can use as start bid.
  minimum-bid-price: 0
  #Maximum price you us as bid. (Auction will be end, if this limit is reached).
  max-beginning-bid-price: 1024
  #Minimum price for selling.
  minimum-sell-price: 0
  #Maximum price for selling.
  max-beginning-sell-price: 1024
  #Maximum of items you can auction at the same time. (0 means no Limit)
  max-biddableItems: 40
  #Maximum of items you can sell at the same time. (0 means no Limit)
  max-sellableItems: 40
  #Items that are blacklisted in the Adrundaalauctions
  blacklist:
    - '7'
    - '8'
    - '9'
    - '10'
    - '11'
    - '137'
    - '166'
    - '217'
    - '255'
    - '383'
    - '120'
  #Item Display Names that are forbidden to insert in the Auctionhouse
  name_blacklist:
    - 'Forbidden Name'
    - 'Class Token'
    - '&cColoredItemName'
  #Itemlores that are forbidden to insert in the Auctionhouse
  lore_blacklist:
    - '&3Forbidden Lore'
    - '&8Soulbound Item'
    - '&6Secret Lore'
  #Say's if damaged items are allowed
  allow-damaged-items: true
  #Time until an auction ends
  bid-time: 7d
  #Time until an offer ends
  sell-time: 7d
  #Time an finished Item will be stored to collect, until destroy.
  full-expire-time: 10d
  #Default window, that will opened. (BID, SELL, COLLECT, MY, FILTER)
  default-shop-view: FILTER
  #Default filter, the Auctionhouse will open first. (Filter.None, Filter.Armor, Filter.Blocks, Filter.Tools, Filter.Food, Filter.Potions)
  default-shop-filter: Filter.None
